name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          printf '\n' >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connectivity
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SSH_OPTIONS="-i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${SSH_PORT:-22}"
          ssh $SSH_OPTIONS "${SSH_USER}@${SSH_HOST}" "echo '[deploy] SSH OK'"

      - name: Sync project to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PLUGIN_SYNC_PATHS: ${{ vars.PLUGIN_SYNC_PATHS }}
        run: |
          SSH_OPTIONS="-i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${SSH_PORT:-22}"
          ssh $SSH_OPTIONS "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}/config' '${DEPLOY_PATH}/scripts/deploy' '${DEPLOY_PATH}/wp-content/themes/adeline-portfolio' '${DEPLOY_PATH}/wp-content/plugins'"

          # Sync infra files only (avoid touching runtime-managed wp-content files).
          rsync -az --delete \
            --omit-dir-times --no-perms --no-owner --no-group \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'wordpress-prod-*.sql' \
            --exclude 'wp-content/**' \
            --exclude 'wp-content/cache/' \
            --exclude 'wp-content/litespeed/' \
            --exclude 'wp-content/uploads/' \
            --exclude 'backups/' \
            -e "ssh ${SSH_OPTIONS}" \
            ./ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

          # Sync only the custom theme for WordPress frontend changes.
          rsync -az --delete \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh ${SSH_OPTIONS}" \
            ./wp-content/themes/adeline-portfolio/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/wp-content/themes/adeline-portfolio/"

          # Optional: sync only selected plugins (space-separated paths in repository variable PLUGIN_SYNC_PATHS).
          # Example: wp-content/plugins/my-plugin wp-content/plugins/my-second-plugin
          if [[ -n "${PLUGIN_SYNC_PATHS:-}" ]]; then
            for rel_path in ${PLUGIN_SYNC_PATHS}; do
              rel_path="${rel_path%/}"

              if [[ "${rel_path}" != wp-content/plugins/* ]]; then
                echo "[deploy] Skipping invalid plugin path: ${rel_path}" >&2
                continue
              fi

              if [[ ! -d "${rel_path}" ]]; then
                echo "[deploy] Skipping missing local plugin path: ${rel_path}" >&2
                continue
              fi

              ssh $SSH_OPTIONS "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}/${rel_path}'"

              rsync -az --delete \
                --omit-dir-times --no-perms --no-owner --no-group \
                -e "ssh ${SSH_OPTIONS}" \
                "./${rel_path}/" \
                "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/${rel_path}/"

              echo "[deploy] Synced plugin path: ${rel_path}"
            done
          else
            echo "[deploy] No plugin path configured in PLUGIN_SYNC_PATHS"
          fi

      - name: Run remote deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SSH_OPTIONS="-i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${SSH_PORT:-22}"
          ssh $SSH_OPTIONS "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && chmod +x scripts/deploy/remote-deploy.sh && DEPLOY_SHA='${GIT_SHA}' scripts/deploy/remote-deploy.sh"